<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ITIAN System{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="min-h-screen bg-gray-950 bg-[radial-gradient(circle_at_top,_rgba(34,211,238,0.14),_transparent_30%),linear-gradient(180deg,_#0f172a_0%,_#020617_100%)] text-gray-200">
    <div class="mx-auto min-h-screen max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <nav class="mb-8 flex flex-col gap-4 rounded-3xl border border-gray-800/80 bg-gray-900/85 px-6 py-5 shadow-2xl shadow-black/30 backdrop-blur sm:flex-row sm:items-center sm:justify-between">
            <div>
                <p class="text-xs font-semibold uppercase tracking-[0.3em] text-cyan-400">ITI Management</p>
                <h1 class="mt-2 text-2xl font-semibold text-white sm:text-3xl">Trainee Operations Dashboard</h1>
            </div>
            <div class="flex flex-wrap items-center gap-3">
                <a href="{% url 'trainee_list' %}" class="rounded-full border border-gray-700 px-4 py-2 text-sm font-medium text-gray-200 transition hover:border-cyan-400 hover:text-cyan-300">Trainees List</a>
                <a href="{% url 'add_trainee' %}" class="rounded-full bg-cyan-400 px-5 py-2 text-sm font-semibold text-gray-950 transition hover:bg-cyan-300">Add New Trainee</a>
            </div>
        </nav>

        <main class="rounded-3xl border border-gray-800 bg-gray-900/70 p-6 shadow-2xl shadow-black/30 sm:p-8">
            {% block content %}
            {% endblock %}
        </main>
    </div>
</body>
</html>
