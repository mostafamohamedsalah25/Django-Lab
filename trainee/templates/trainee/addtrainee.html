{% extends 'parent.html' %}

{% block title %}Add New Trainee{% endblock %}

{% block content %}
    <h3>Register a New Trainee</h3>
    
    <form method="POST">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit">Save Trainee</button>
    </form>
    
    <br>
    <a href="{% url 'trainee_list' %}">Cancel and go back</a>
{% endblock %}
