{% extends 'parent.html' %}

{% block title %}Update Trainee{% endblock %}

{% block content %}
    <h3>Update Trainee: {{ trainee.first_name }} {{ trainee.last_name }}</h3>
    
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit">Save Changes</button>
    </form>
    
    <br>
    <a href="{% url 'trainee_list' %}">Cancel and go back</a>
{% endblock %}
